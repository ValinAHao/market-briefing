name: Auto Merge Briefing PR

on:
  workflow_run:
    workflows: ["Market Briefing"]
    types: [completed]

jobs:
  auto-merge:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge open briefing PRs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          prs=$(gh pr list --repo "$REPO" --state open --base main \
                  --search "label:briefing author:app/github-actions" \
                  --json number \
                  --jq '.[].number')
          if [ -z "$prs" ]; then
            echo "No open briefing PRs to merge."
            exit 0
          fi
          for n in $prs; do
            echo "Merging PR #$n"
            gh pr merge "$n" --repo "$REPO" --squash --delete-branch
          done
