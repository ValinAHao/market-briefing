name: Auto Merge Briefing PR

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  auto-merge:
    if: github.actor == 'github-actions[bot]' && startsWith(github.head_ref, 'briefing/')
    runs-on: ubuntu-latest
    steps:
      - name: Merge PR
        run: gh pr merge "${{ github.event.pull_request.html_url }}" --squash
        env:
          GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
